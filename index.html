<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCLEX Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f6f8; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .btn { background: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NCLEX Clinical Judgment Simulator</h1>
        <p>Welcome to your simulation practice!</p>
        <div id="quiz-area">Loading questions...</div>
    </div>

    <script src="questions.js"></script>
    <script>
        // Simple script to test if the questions loaded
        window.onload = function() {
            const quizArea = document.getElementById('quiz-area');
            if (typeof questions !== 'undefined' && questions.length > 0) {
                quizArea.innerHTML = `<p><strong>Success!</strong> Loaded ${questions.length} questions. Ready to begin.</p> <button class="btn">Start Exam</button>`;
            } else {
                quizArea.innerHTML = "Error: Could not load questions. Check your questions.js file!";
            }
        }
    </script>
</body>
</html>
